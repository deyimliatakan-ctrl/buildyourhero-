          { min: 600, title: 'Level 7: PLANETARY ANNIHILATOR', desc: 'You have the power to turn planets into dust.' },
          { min: 500, title: 'Level 6: EARTH\'S MIGHTIEST', desc: 'You are the undisputed strongest defender of the world.' },
          { min: 400, title: 'Level 5: OMEGA LEVEL HERO', desc: 'You harbor immense potential.' },
          { min: 300, title: 'Level 4: CITY PROTECTOR', desc: 'The safety of major cities is entrusted to you.' },
          { min: 200, title: 'Level 3: STREET BRAWLER', desc: 'A tough fighter ensuring justice on the streets.' },
          { min: 100, title: 'Level 2: SIDEKICK', desc: 'The reliable assistant to the main hero.' },
          { min: 0, title: 'Level 1: CIVILIAN', desc: 'It is best for everyone if you stay away from the battlefield.' }
        ]
      }
    };

    const getHeroLevel = (score, lang) => {
      const levels = T[lang].levels;
      return levels.find(l => score >= l.min) || levels[levels.length - 1];
    };

    function App() {
      const [lang, setLang] = useState('tr');
      const [universeFilter, setUniverseFilter] = useState('All');
      const [slots, setSlots] = useState({});
      const [currentHero, setCurrentHero] = useState(null);
      const [usedHeroIds, setUsedHeroIds] = useState([]);
      const [skipsLeft, setSkipsLeft] = useState(MAX_SKIPS);
      const [gameOver, setGameOver] = useState(false);
      const [hoveredCategory, setHoveredCategory] = useState(null);

      const t = T[lang];

      const selectRandomHero = (filter, usedIds) => {
        let pool = HEROES.filter(h => !usedIds.includes(h.id));
        if (filter !== 'All') {
          pool = pool.filter(h => h.universe === filter);
        }
        if (pool.length === 0) return null;
        return pool[Math.floor(Math.random() * pool.length)];
      };

      const drawHero = () => {
        let newHero = selectRandomHero(universeFilter, usedHeroIds);
        if (!newHero && universeFilter !== 'All') {
            newHero = selectRandomHero('All', usedHeroIds);
        }

        if (newHero) {
          setCurrentHero(newHero);
          setUsedHeroIds(prev => [...prev, newHero.id]);
        } else {
           if(!gameOver) setGameOver(true);
        }
      };

      useEffect(() => {
        if (!currentHero && !gameOver) drawHero();
      }, []);

      const handleUniverseChange = (filter) => {
        if(filter === universeFilter) return; 
        setUniverseFilter(filter);
        setSlots({});
        setUsedHeroIds([]);
        setSkipsLeft(MAX_SKIPS);
        setGameOver(false);
        setCurrentHero(null);
        setTimeout(() => {
            let newHero = selectRandomHero(filter, []);
            if(newHero){
                setCurrentHero(newHero);
                setUsedHeroIds([newHero.id]);
            }
        }, 50);
      };

      const handlePlaceHero = (categoryId) => {
        if (!currentHero || slots[categoryId]) return;

        const newSlots = { ...slots, [categoryId]: currentHero };
        setSlots(newSlots);
        setCurrentHero(null);

        if (Object.keys(newSlots).length === 10) {
          setGameOver(true);
        } else {
          drawHero();
        }
      };

      const handleSkip = () => {
        if (skipsLeft > 0 && currentHero) {
          setSkipsLeft(skipsLeft - 1);
          setCurrentHero(null);
          drawHero();
        }
      };

      const handleReset = () => {
        setSlots({});
        setUsedHeroIds([]);
        setSkipsLeft(MAX_SKIPS);
        setGameOver(false);
        setCurrentHero(null);
        setTimeout(() => {
            let newHero = selectRandomHero(universeFilter, []);
            if(newHero){
                setCurrentHero(newHero);
                setUsedHeroIds([newHero.id]);
            }
        }, 50);
      };

      const totalScore = Object.entries(slots).reduce((total, [categoryId, hero]) => {
        return total + (hero ? hero.stats[categoryId] : 0);
      }, 0);

      const heroLevel = getHeroLevel(totalScore, lang);

      return (
        <div className="min-h-screen flex flex-col relative">
          <header className="border-b border-zinc-900 bg-zinc-950/80 backdrop-blur-md sticky top-0 z-50">
            <div className="max-w-3xl mx-auto px-4 sm:px-6 py-4 flex flex-col sm:flex-row items-center justify-between gap-4">
              <h1 className="text-xl sm:text-2xl font-black italic uppercase tracking-tighter text-zinc-100 flex items-center gap-2">
                BUILD YOUR <span className="text-zinc-500">HERO</span>
              </h1>
              
              <div className="flex gap-2 items-center">
                <div className="flex bg-zinc-900 rounded p-1 mr-1 sm:mr-3 border border-zinc-800">
                  <button 
                    onClick={() => setLang('tr')} 
                    className={`px-2 py-1 text-[9px] sm:text-[10px] font-bold rounded transition-colors ${lang === 'tr' ? 'bg-zinc-700 text-white' : 'text-zinc-500 hover:text-white'}`}
                  >
                    {/* Created by & Logo */}
            <div className="flex items-center gap-2 sm:border-l border-zinc-800 sm:pl-4 mt-2 sm:mt-0">
              <span className="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-0.5">Created by</span>
              <a href="https://youtube.com/@dyml02?si=3j0b3ZT0k6TsDszN" target="_blank" rel="noopener noreferrer" className="hover:scale-105 hover:opacity-80 transition-all duration-200">
                <img src="./DYML New Logo (4).png" alt="DYML 02" className="h-6 sm:h-7 object-contain" />
              </a>
            </div>
          </div>
                    TR
                  </button>
                  <button 
                    onClick={() => setLang('en')} 
                    className={`px-2 py-1 text-[9px] sm:text-[10px] font-bold rounded transition-colors ${lang === 'en' ? 'bg-zinc-700 text-white' : 'text-zinc-500 hover:text-white'}`}
                  >
                    EN
                  </button>
                </div>

                {[
                  { label: t.all, value: 'All', activeColor: 'bg-zinc-700 text-white' }, 
                  { label: 'Marvel', value: 'Marvel', activeColor: 'bg-red-600 text-white shadow-lg shadow-red-500/20' }, 
                  { label: 'DC', value: 'DC', activeColor: 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' }
                ].map(filter => (
                  <button
                    key={filter.value}
                    onClick={() => handleUniverseChange(filter.value)}
                    className={`px-3 sm:px-4 py-1.5 text-[10px] sm:text-xs font-bold uppercase tracking-widest rounded transition-all ${
                      universeFilter === filter.value 
                        ? filter.activeColor 
                        : 'bg-zinc-900 text-zinc-500 hover:bg-zinc-800 hover:text-zinc-300'
                    }`}
                  >
                    {filter.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-3xl mx-auto w-full px-4 sm:px-6 py-6 flex flex-col items-center">
            <div className="flex flex-col items-center justify-center w-full min-h-[200px] mb-8">
              {!gameOver ? (
                currentHero ? (
                  <div className="w-full max-w-lg text-center bg-zinc-900 p-6 sm:p-8 rounded-3xl border border-zinc-800 shadow-2xl animate-in fade-in zoom-in duration-500">
                    <p className={`font-black tracking-widest uppercase text-xs mb-2 ${currentHero.universe === 'Marvel' ? 'text-red-500' : 'text-blue-500'}`}>
                      {currentHero.universe}
                    </p>
                    <h2 className="text-4xl sm:text-5xl font-black uppercase tracking-tighter mb-6 text-zinc-100">
                      {currentHero.name}
                    </h2>
                    
                    <div className="flex justify-center gap-2 sm:gap-3 mb-8">
                      {CATEGORY_IDS.map(id => (
                        <div key={id} className="flex flex-col items-center bg-black/50 p-2 rounded-lg border border-zinc-800/50 w-10 sm:w-12">
                          <span className="text-[8px] sm:text-[9px] text-zinc-500 uppercase font-bold tracking-wider mb-1">{t.cats[id].short}</span>
                          <span className="text-sm sm:text-base font-black text-zinc-300">{currentHero.stats[id]}</span>
                        </div>
                      ))}
                    </div>

                    <button
                      onClick={handleSkip}
                      disabled={skipsLeft === 0}
                      className={`inline-flex items-center gap-2 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest transition-all ${
                        skipsLeft > 0 
                          ? 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700 hover:text-white border border-zinc-700' 
                          : 'bg-zinc-950 text-zinc-700 border border-zinc-900 cursor-not-allowed opacity-50'
                      }`}
                    >
                      <SkipForwardIcon className="w-4 h-4" />
                      {t.skip} ({skipsLeft})
                    </button>
                  </div>
                ) : (
                  <div className="text-zinc-600 animate-pulse font-bold uppercase tracking-widest">
                    {t.searching}
                  </div>
                )
              ) : (
                <div className="w-full text-center bg-zinc-900 p-8 rounded-3xl border border-zinc-800 shadow-2xl animate-in zoom-in duration-500">
                  <TrophyIcon className={`w-16 h-16 sm:w-20 sm:h-20 mx-auto mb-6 ${totalScore >= 950 ? 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]' : 'text-zinc-100'}`} />
                  <h2 className="text-3xl sm:text-4xl font-black uppercase tracking-tighter mb-4">{t.heroCompleted}</h2>
                  
                  <div className="mb-8">
                    <span className="text-sm text-zinc-500 font-bold uppercase tracking-widest block mb-1">{t.totalScore}</span>
                    <span className={`text-5xl font-black tracking-tighter ${totalScore >= 950 ? 'text-yellow-400' : 'text-white'}`}>{totalScore} <span className="text-xl text-zinc-600">/ 1000</span></span>
                  </div>

                  <div className={`inline-block border ${totalScore >= 950 ? 'border-yellow-500 bg-yellow-500/10' : 'border-zinc-700 bg-zinc-800/50'} px-6 py-4 rounded-2xl mb-8`}>
                    <p className={`text-[10px] uppercase font-bold tracking-widest mb-1 ${totalScore >= 950 ? 'text-yellow-600' : 'text-zinc-400'}`}>{t.levelReached}</p>
                    <p className={`text-xl sm:text-2xl font-black uppercase tracking-tighter ${totalScore >= 950 ? 'text-yellow-400' : 'text-zinc-100'}`}>{heroLevel.title}</p>
                  </div>

                  <p className="text-zinc-400 text-sm max-w-md mx-auto mb-8 px-4 italic">
                    "{heroLevel.desc}"
                  </p>

                  <div>
                    <button
                      onClick={handleReset}
                      className="inline-flex items-center gap-2 px-8 py-4 bg-zinc-100 text-zinc-950 rounded-full text-xs font-black uppercase tracking-widest hover:bg-white hover:scale-105 transition-all"
                    >
                      <RefreshCcwIcon className="w-4 h-4" />
                      {t.playAgain}
                    </button>
                  </div>
                </div>
              )}
            </div>

            <div className="w-full max-w-4xl pb-10 relative">
              <div className="grid grid-cols-2 sm:grid-cols-5 gap-2 sm:gap-3">
                {CATEGORY_IDS.map((catId) => {
                  const placedHero = slots[catId];
                  const isAvailable = !placedHero && !gameOver;
                  
                  return (
                    <div
                      key={catId}
                      onClick={() => isAvailable && handlePlaceHero(catId)}
                      onMouseEnter={() => setHoveredCategory(t.cats[catId].full)}
                      onMouseLeave={() => setHoveredCategory(null)}
                      className={`relative flex flex-col items-center justify-between p-3 sm:p-4 rounded-2xl border-2 transition-all duration-200 h-24 sm:h-28 ${
                        placedHero
                          ? 'bg-zinc-800 border-zinc-700'
                          : isAvailable
                            ? 'bg-zinc-900 border-zinc-800 border-dashed hover:border-zinc-500 hover:bg-zinc-800 cursor-pointer'
                            : 'bg-zinc-950 border-zinc-900 border-dashed opacity-50'
                      }`}
                    >
                      <span className="text-[10px] sm:text-xs font-bold uppercase tracking-widest text-zinc-500">
                        {t.cats[catId].short}
                      </span>

                      <span className={`text-xs sm:text-sm font-black uppercase text-center w-full truncate px-1 tracking-tighter ${!placedHero && isAvailable ? 'text-zinc-600' : 'text-zinc-200'}`}>
                        {placedHero ? placedHero.name : (isAvailable ? t.select : '---')}
                      </span>

                      <span className="text-lg sm:text-xl font-black text-yellow-500 tracking-tighter min-h-[28px]">
                        {placedHero ? placedHero.stats[catId] : ''}
                      </span>
                    </div>
                  );
                })}
              </div>

              {hoveredCategory && (
                <div className="absolute -top-12 left-1/2 -translate-x-1/2 bg-white text-black text-xs font-black uppercase tracking-widest px-4 py-2 rounded-lg shadow-2xl pointer-events-none animate-in slide-in-from-bottom-2 duration-200 z-50">
                  {hoveredCategory}
                </div>
              )}
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
