          data.sort((a, b) => b.score - a.score);

        return () => unsubscribe();

        let pool = HEROES.filter(h => !usedIds.includes(h.id));
        if (filter !== 'All') {
          pool = pool.filter(h => h.universe === filter);
        }
        if (pool.length === 0) return null;
        return pool[Math.floor(Math.random() * pool.length)];

        let newHero = selectRandomHero(universeFilter, usedHeroIds);

                        ? filter.activeColor 
                        : 'bg-zinc-900 text-zinc-500 hover:bg-zinc-800 hover:text-zinc-300'
                    }`}
                  >
                    {filter.label}
                  </button>
                ))}
              </div>
            </div>
          </header>

          <main className="flex-1 max-w-3xl mx-auto w-full px-2 sm:px-6 py-4 sm:py-6 flex flex-col items-center">
            
            {!gameStarted ? (
              /* --- BAŞLANGIÇ EKRANI --- */
              <div className="flex flex-col items-center justify-center w-full min-h-[60vh] px-2">
                 <div className="w-full max-w-md bg-zinc-900 p-8 sm:p-10 rounded-3xl border border-zinc-800 shadow-2xl animate-in zoom-in duration-500 text-center">
                    <h2 className="text-2xl sm:text-3xl font-black uppercase tracking-tighter mb-2 text-zinc-100">{t.enterHeroName}</h2>
                    <p className="text-zinc-500 text-xs sm:text-sm font-bold tracking-widest uppercase mb-8">{t.startDesc}</p>
                    
                    <input 
                      type="text" 
                      value={heroNameInput}
                      onChange={(e) => setHeroNameInput(e.target.value)}
                      placeholder={t.placeholder}
                      maxLength={15}
                      className="w-full bg-zinc-950 border-2 border-zinc-800 rounded-2xl px-6 py-4 text-center font-black text-xl text-white outline-none focus:border-zinc-500 transition-colors mb-6 uppercase tracking-widest placeholder:text-zinc-700"
                      onKeyDown={(e) => { if(e.key === 'Enter') startGame(); }}
                    />
                    
                    <button 
                      onClick={startGame}
                      className="w-full py-4 bg-zinc-100 text-zinc-950 rounded-2xl font-black uppercase tracking-widest hover:bg-white hover:scale-[1.02] active:scale-95 transition-all"
                    >
                      {t.start}
                    </button>
                 </div>
              </div>
            ) : (
              /* --- OYUN & BİTİŞ EKRANI --- */
              <>
                <div className="flex flex-col items-center justify-center w-full min-h-[200px] mb-6 sm:mb-8">
                  {!gameOver ? (
                    currentHero ? (
                      <div className="w-full max-w-lg text-center bg-zinc-900 p-4 sm:p-8 rounded-2xl sm:rounded-3xl border border-zinc-800 shadow-2xl animate-in fade-in zoom-in duration-500">
                        <p className={`font-black tracking-widest uppercase text-[10px] sm:text-xs mb-1 sm:mb-2 ${currentHero.universe === 'Marvel' ? 'text-red-500' : 'text-blue-500'}`}>
                          {currentHero.universe}
                        </p>
                        <h2 className="text-3xl sm:text-5xl font-black uppercase tracking-tighter mb-4 sm:mb-6 text-zinc-100 px-2">
                          {currentHero.name}
                        </h2>
                        
                        <div className="grid grid-cols-5 gap-1 sm:gap-3 mb-6 sm:mb-8 w-full">
                          {CATEGORY_IDS.map(id => (
                            <div key={id} className="flex flex-col items-center bg-black/50 p-1.5 sm:p-2 rounded-lg border border-zinc-800/50 w-full">
                              <span className="text-[7px] sm:text-[9px] text-zinc-500 uppercase font-bold tracking-wider mb-0.5 sm:mb-1 truncate w-full text-center">{t.cats[id].short}</span>
                              <span className="text-xs sm:text-base font-black text-zinc-300">{currentHero.stats[id]}</span>
                            </div>
                          ))}
                        </div>

                        <button
                          onClick={handleSkip}
                          disabled={skipsLeft === 0}
                          className={`inline-flex items-center gap-1 sm:gap-2 px-5 sm:px-6 py-2 sm:py-3 rounded-full text-[10px] sm:text-xs font-bold uppercase tracking-widest transition-all ${
                            skipsLeft > 0 
                              ? 'bg-zinc-800 text-zinc-300 hover:bg-zinc-700 hover:text-white border border-zinc-700' 
                              : 'bg-zinc-950 text-zinc-700 border border-zinc-900 cursor-not-allowed opacity-50'
                          }`}
                        >
                          <SkipForwardIcon className="w-3 h-3 sm:w-4 sm:h-4" />
                          {t.skip} ({skipsLeft})
                        </button>
                      </div>
                    ) : (
                      <div className="text-zinc-600 animate-pulse font-bold uppercase tracking-widest text-sm">
                        {t.searching}
                      </div>
                    )
                  ) : (
                    <div className="w-full text-center bg-zinc-900 p-6 sm:p-8 rounded-2xl sm:rounded-3xl border border-zinc-800 shadow-2xl animate-in zoom-in duration-500">
                      <TrophyIcon className={`w-12 h-12 sm:w-20 sm:h-20 mx-auto mb-4 sm:mb-6 ${totalScore >= 950 ? 'text-yellow-400 drop-shadow-[0_0_15px_rgba(250,204,21,0.5)]' : 'text-zinc-100'}`} />
                      
                      <h2 className="text-3xl sm:text-4xl font-black uppercase tracking-tighter mb-2 text-yellow-400">
                        {heroName}
                      </h2>
                      <p className="text-lg sm:text-xl font-bold uppercase tracking-widest text-zinc-300 mb-6">
                        {t.heroCompleted}
                      </p>
                      
                      <div className="mb-6 sm:mb-8">
                        <span className="text-xs sm:text-sm text-zinc-500 font-bold uppercase tracking-widest block mb-1">{t.totalScore}</span>
                        <span className={`text-4xl sm:text-5xl font-black tracking-tighter ${totalScore >= 950 ? 'text-yellow-400' : 'text-white'}`}>{totalScore} <span className="text-lg sm:text-xl text-zinc-600">/ 1000</span></span>
                      </div>

                      <div className={`inline-block border ${totalScore >= 950 ? 'border-yellow-500 bg-yellow-500/10' : 'border-zinc-700 bg-zinc-800/50'} px-4 sm:px-6 py-3 sm:py-4 rounded-xl sm:rounded-2xl mb-6 sm:mb-8 w-full sm:w-auto`}>
                        <p className={`text-[9px] sm:text-[10px] uppercase font-bold tracking-widest mb-1 ${totalScore >= 950 ? 'text-yellow-600' : 'text-zinc-400'}`}>{t.levelReached}</p>
                        <p className={`text-lg sm:text-2xl font-black uppercase tracking-tighter ${totalScore >= 950 ? 'text-yellow-400' : 'text-zinc-100'}`}>{heroLevel.title}</p>
                      </div>

                      <p className="text-zinc-400 text-xs sm:text-sm max-w-md mx-auto mb-6 sm:mb-8 px-2 italic">
                        "{heroLevel.desc}"
                      </p>

                      <div>
                        <button
                          onClick={handleReset}
                          className="inline-flex items-center gap-2 px-6 sm:px-8 py-3 sm:py-4 bg-zinc-100 text-zinc-950 rounded-full text-[10px] sm:text-xs font-black uppercase tracking-widest hover:bg-white hover:scale-105 transition-all"
                        >
                          <RefreshCcwIcon className="w-3 h-3 sm:w-4 sm:h-4" />
                          {t.playAgain}
                        </button>
                      </div>

                      {/* --- GERÇEK CANLI SIRALAMA TABLOSU --- */}
                      <div className="w-full max-w-md mx-auto mt-8 text-left bg-zinc-950/50 p-4 sm:p-6 rounded-2xl border border-zinc-800">
                        <div className="flex justify-between items-end mb-4">
                          <h3 className="text-zinc-500 font-bold uppercase tracking-widest text-xs sm:text-sm">{t.leaderboard}</h3>
                          {userRank && (
                            <span className="text-yellow-500 font-black uppercase tracking-tighter text-sm sm:text-base">
                              {t.yourRank}: #{userRank}
                            </span>
                          )}
                        </div>
                        <div className="flex flex-col gap-2">
                          {leaderboard.length === 0 && (
                            <div className="text-center text-zinc-600 text-xs py-4 uppercase font-bold tracking-widest">Yükleniyor...</div>
                          )}
                          {/* İLK 10'U LİSTELE */}
                          {top10.map((entry, idx) => (
                            <div key={entry.id} className={`flex items-center justify-between p-3 rounded-xl border ${entry.id === currentRunId ? 'bg-yellow-500/10 border-yellow-500/30 shadow-[0_0_15px_rgba(234,179,8,0.1)]' : 'bg-zinc-900 border-zinc-800'}`}>
                              <div className="flex items-center gap-3 sm:gap-4">
                                <span className={`font-black w-4 sm:w-6 text-center text-xs sm:text-sm ${entry.id === currentRunId ? 'text-yellow-500' : 'text-zinc-500'}`}>{idx + 1}</span>
                                <span className={`font-bold uppercase tracking-tighter text-xs sm:text-sm truncate max-w-[120px] sm:max-w-[180px] ${entry.id === currentRunId ? 'text-yellow-400' : 'text-zinc-300'}`}>{entry.name}</span>
                              </div>
                              <span className={`font-black tracking-tighter text-sm sm:text-base ${entry.id === currentRunId ? 'text-yellow-400' : 'text-zinc-100'}`}>{entry.score}</span>
                            </div>
                          ))}
                          {/* EĞER KULLANICI İLK 10'DA DEĞİLSE, EN ALTA ONU EKLE */}
                          {userRank && !isUserInTop10 && (
                            <>
                              <div className="text-center text-zinc-600 font-black my-1">...</div>
                              <div className="flex items-center justify-between p-3 rounded-xl border bg-yellow-500/10 border-yellow-500/30 shadow-[0_0_15px_rgba(234,179,8,0.1)]">
                                <div className="flex items-center gap-3 sm:gap-4">
                                  <span className="font-black w-4 sm:w-6 text-center text-xs sm:text-sm text-yellow-500">{userRank}</span>
                                  <span className="font-bold uppercase tracking-tighter text-xs sm:text-sm truncate max-w-[120px] sm:max-w-[180px] text-yellow-400">{heroName}</span>
                                </div>
                                <span className="font-black tracking-tighter text-sm sm:text-base text-yellow-400">{totalScore}</span>
                              </div>
                            </>
                          )}
                        </div>
                      </div>

                    </div>
                  )}
                </div>

                <div className="w-full max-w-4xl pb-10 relative px-1 sm:px-0">
                  <div className="grid grid-cols-5 gap-1.5 sm:gap-3">
                    {CATEGORY_IDS.map((catId) => {
                      const placedHero = slots[catId];
                      const isAvailable = !placedHero && !gameOver;
                      
                      return (
                        <div
                          key={catId}
                          onClick={() => isAvailable && handlePlaceHero(catId)}
                          onMouseEnter={() => setHoveredCategory(t.cats[catId].full)}
                          onMouseLeave={() => setHoveredCategory(null)}
                          className={`relative flex flex-col items-center justify-between p-1.5 sm:p-4 rounded-xl sm:rounded-2xl border sm:border-2 transition-all duration-200 h-16 sm:h-28 ${
                            placedHero
                              ? 'bg-zinc-800 border-zinc-700'
                              : isAvailable
                                ? 'bg-zinc-900 border-zinc-800 border-dashed hover:border-zinc-500 hover:bg-zinc-800 cursor-pointer'
                                : 'bg-zinc-950 border-zinc-900 border-dashed opacity-50'
                          }`}
                        >
                          <span className="text-[7px] sm:text-xs font-bold uppercase tracking-widest text-zinc-500 w-full text-center truncate">
                            {t.cats[catId].short}
                          </span>

                          <span className={`text-[8px] sm:text-sm font-black uppercase text-center w-full truncate px-0.5 tracking-tighter ${!placedHero && isAvailable ? 'text-zinc-600' : 'text-zinc-200'}`}>
                            {placedHero ? placedHero.name : (isAvailable ? t.select : '---')}
                          </span>

                          <span className="text-xs sm:text-xl font-black text-yellow-500 tracking-tighter min-h-[16px] sm:min-h-[28px]">
                            {placedHero ? placedHero.stats[catId] : ''}
                          </span>
                        </div>
                      );
                    })}
                  </div>

                  {hoveredCategory && (
                    <div className="absolute -top-12 left-1/2 -translate-x-1/2 bg-white text-black text-[10px] sm:text-xs font-black uppercase tracking-widest px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg shadow-2xl pointer-events-none animate-in slide-in-from-bottom-2 duration-200 z-50 whitespace-nowrap">
                      {hoveredCategory}
                    </div>
                  )}
                </div>
              </>
            )}

          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
